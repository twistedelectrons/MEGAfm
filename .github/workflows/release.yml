name: release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: .
      - name: Extract version from constants.h
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('include/constants.h', 'utf8');
            const version0 = content.match(/const byte kVersion0[^0-9]*([0-9]+)/)[1];
            const version1 = content.match(/const byte kVersion1[^0-9]*([0-9]+)/)[1];
            const version = `${version0}.${version1}`;
            core.setOutput('version', version);
            core.setOutput('firmware_name', `MEGAfm.${version}.syx`);
      - name: Rename firmware artifact
        run: mv firmware.syx MEGAfm.${{ steps.version.outputs.version }}.syx
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: MEGAfm.${{ steps.version.outputs.version }}.syx
          name: MEGAfm v${{ steps.version.outputs.version }}
          generate_release_notes: true
