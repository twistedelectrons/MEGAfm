name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: megafm
      - name: Check Format
        run: |
          docker run -v $(pwd):/workspace -w /workspace --rm megafm make check_fmt
      - name: Build Firmware
        run: |
          docker run -v $(pwd):/workspace -w /workspace --rm megafm make firmware.syx
      - name: Create firmware artifact
        uses: actions/upload-artifact@v7
        with:
          path: firmware.syx
          name: firmware
          archive: false
